<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" id="viewport-meta" />
    <script>
      // Force 1920x1080 fixed viewport on non-desktop screens
      // so the page looks identical to desktop (like viewing a PDF)
      (function() {
        var vp = document.getElementById('viewport-meta');
        var desktopWidth = 1920;
        var desktopHeight = 1080;
        if (window.screen.width < desktopWidth) {
          vp.setAttribute('content', 'width=' + desktopWidth + ', height=' + desktopHeight + ', initial-scale=' + (window.screen.width / desktopWidth).toFixed(4) + ', user-scalable=yes');
        }
      })();
    </script>
    <title>Neeko Wu — UI/UX 设计师</title>
    <meta name="description" content="Neeko Wu 的作品集，专注美团生活服务领域的 UI/UX 设计，涵盖闪购改版、每日低价、情感化设计、拼好饭增长与年度账单等项目。" />
    <meta property="og:title" content="Neeko Wu — UI/UX 设计师" />
    <meta property="og:description" content="专注美团生活服务领域的 UI/UX 设计作品集，涵盖闪购改版、每日低价、情感化设计等项目。" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Neeko Wu — UI/UX 设计师" />
    <meta name="twitter:description" content="专注美团生活服务领域的 UI/UX 设计作品集。" />
  </head>
  <body>

    <script>
      if (window.location.protocol === "file:") {
        document.documentElement.style.background = "#050b18";
        document.addEventListener("DOMContentLoaded", function () {
          document.body.innerHTML =
            '<main style="min-height:100vh;display:grid;place-items:center;margin:0;background:#050b18;color:#f8fafc;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:24px;text-align:center;">' +
            '<section style="max-width:560px;">' +
            '<h1 style="font-size:28px;line-height:1.2;margin:0 0 14px;">This React portfolio needs the Vite dev server.</h1>' +
            '<p style="color:#cbd5e1;line-height:1.8;margin:0 0 24px;">不要直接打开 index.html。请使用 npm run dev 后访问本地预览地址。</p>' +
            '<a href="http://localhost:5173/" style="display:inline-flex;border-radius:999px;background:#fff;color:#07101f;padding:12px 18px;font-size:14px;font-weight:700;text-decoration:none;">Open http://localhost:5173/</a>' +
            '</section>' +
            "</main>";
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
